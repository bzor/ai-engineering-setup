# kitty config — mirrors the wezterm setup (black metal gorgoroth, roomy padding)
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Reload with cmd+ctrl+, (or restart kitty)

# --- Theme (copied from black-metal-theme-neovim extras, matches nvim) ---
include themes/black-metal-gorgoroth.conf

# --- Font ---
# Iosevka Term (Nerd Font build for dashboard icons); tall + narrow.
font_family      IosevkaTerm Nerd Font Mono
font_size        14.0
modify_font cell_width 95%
text_composition_strategy legacy
# alternate: font_family FiraCode Nerd Font Mono

# --- Window ---
remember_window_size  no
initial_window_width  120c
initial_window_height 28c
hide_window_decorations titlebar-only
# padding is in pts (retina px / 2); tight 6 all around
window_padding_width 6
background_opacity 1.0
# background_blur 50

# --- Tabs (living in tmux, so keep these quiet) ---
tab_bar_min_tabs 2
tab_bar_style    powerline

# --- Cursor trail (comet-tail animation when the cursor jumps) ---
cursor_trail 3
cursor_trail_decay 0.05 0.2
cursor_trail_start_threshold 2

# --- Behavior ---
macos_option_as_alt yes
enable_audio_bell   no
scrollback_lines    10000
confirm_os_window_close 0

# --- Performance (~120fps, matches wezterm max_fps) ---
repaint_delay   8
input_delay     2
sync_to_monitor yes
