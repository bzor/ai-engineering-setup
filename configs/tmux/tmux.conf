# ~/.tmux.conf (symlinked from ai-engineering-setup/configs/tmux)
# Reload after edits with: prefix + r

# --- General ---
set -g mouse on            # click to select panes/windows, drag to resize, scroll to page
set -g history-limit 50000 # lines of scrollback kept per pane
set -g focus-events on     # forward focus in/out to apps (lets nvim auto-reload on pane switch)
set -sg escape-time 0      # no delay after Esc — makes Esc feel instant in nvim

# --- Colors (true color for nvim termguicolors) ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"  # advertise RGB/true-color support

# --- Window / pane indexing ---
set -g base-index 1        # windows start at 1 instead of 0
setw -g pane-base-index 1  # panes start at 1 too
set -g renumber-windows on # close a window → renumber the rest so there are no gaps

# --- Prefix ---
# Accept both C-Space (primary) and C-b (secondary) as the prefix
set -g prefix C-Space      # main prefix: Ctrl-Space
set -g prefix2 C-b         # also accept the old Ctrl-b, for muscle memory
bind C-Space send-prefix   # press prefix twice to send a literal C-Space to the app inside

# --- Copy mode ---
setw -g mode-keys vi       # use vi-style keys when navigating scrollback/copy mode
bind -T copy-mode-vi v send -X begin-selection              # v → start selecting
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy" # y → yank to macOS clipboard

# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"  # prefix + r

# --- Splits (open in the current pane's directory) ---
bind | split-window -h -c "#{pane_current_path}"  # prefix + |  → split left/right
bind - split-window -v -c "#{pane_current_path}"  # prefix + -  → split top/bottom
bind c new-window -c "#{pane_current_path}"        # prefix + c  → new window in same dir
unbind '"'                 # remove default horizontal split
unbind %                   # remove default vertical split

# --- Pane navigation (vim-style) ---
bind h select-pane -L      # prefix + h → move to pane on the left
bind j select-pane -D      # prefix + j → move to pane below
bind k select-pane -U      # prefix + k → move to pane above
bind l select-pane -R      # prefix + l → move to pane on the right

# --- Pane resize (repeatable: hold the key after prefix) ---
bind -r H resize-pane -L 5 # prefix + H → grow left
bind -r J resize-pane -D 5 # prefix + J → grow down
bind -r K resize-pane -U 5 # prefix + K → grow up
bind -r L resize-pane -R 5 # prefix + L → grow right

# --- Window navigation (move left/right along the status bar) ---
# Repeatable: after prefix, keep tapping n/p to cycle without re-pressing prefix.
bind -r n next-window       # prefix + n (then n n n…) → next project window
bind -r p previous-window   # prefix + p (then p p p…) → previous project window
# No-prefix, instant: Alt-h/l jump windows. Mnemonic: prefix h/l = panes,
# Alt h/l = windows. (Alt = Option; kitty has macos_option_as_alt on.)
bind -n M-h previous-window
bind -n M-l next-window

# --- Reorder windows (drag the current window along the bar) ---
# Alt-Shift-h/l drag the current window left/right, focus following it. Each
# press is an adjacent swap, so dragging N slots inserts there and shifts the
# rest over (e.g. drag window 5 left 3× → it lands at slot 2). renumber-windows
# keeps the indices gap-free. To open a project into slot 1: prefix f, then
# Alt-Shift-h until it's at the front.
bind -n M-H swap-window -d -t -1
bind -n M-L swap-window -d -t +1

# --- Project switcher (fuzzy-open any project as a window; needs fzf) ---
bind f display-popup -E -w 60% -h 60% "~/.local/bin/tmux-sessionizer"  # prefix + f

# --- Status bar (windows = projects, all visible along the bottom) ---
# Dark-gray bar with light text; the focused window inverts to bright bg / dark text.
set -g status-style "bg=#1a1a1a,fg=#c1c1c1"
set -g status-justify left
set -g status-left "#[bold] #S  "            # session name (e.g. "work") on the left
set -g status-left-length 20
set -g status-right " %a %d %b  %H:%M "      # date + clock on the right
setw -g window-status-format " #I:#W "       # inactive project: "3:small-omens" (inherits bar style)
setw -g window-status-current-format " #I:#W "                 # active project
setw -g window-status-current-style "bg=#c1c1c1,fg=#000000,bold"  # bright bg, dark text
